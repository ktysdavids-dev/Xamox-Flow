services:
  - type: web
    name: xamox-flow
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /_xamox_ping
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: xamox_flow
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://www.xamoxflow.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
